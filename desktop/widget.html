<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Swayra Widget</title>
<style>
  :root{
    /* Swayra Kinetic — charcoal + vibrant orange accent */
    --slate900:#191C1D; --slate700:#33373A; --slate500:#6E6E6E; --slate400:#9A9A9A;
    --slate200:#E2E8F0; --blue:#A73A00; --rose:#BA1A1A;
  }
  html,body{ margin:0; height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    /* whole widget is draggable like a sticky note */
    -webkit-app-region: drag;
    user-select:none;
    background:transparent;
  }
  .card{
    box-sizing:border-box;
    height:100%;
    background:#FFFFFF;
    /* fills the opaque window cleanly (no rounded corners showing the bg) */
    border:2px solid var(--slate900);
    border-radius:0;
    padding:14px 16px;
    display:flex; flex-direction:column;
    position:relative;
    overflow:hidden;
  }
  .mono{ font-family:ui-monospace,SFMono-Regular,Consolas,monospace; }
  .nextup{ font-family:ui-monospace,monospace; font-size:10px; font-weight:700;
           letter-spacing:2px; color:var(--blue); }
  .num{ font-family:ui-monospace,monospace; font-weight:700; font-size:46px;
        color:var(--slate900); line-height:1; }
  .num .d{ font-size:20px; color:var(--slate500); font-weight:700; margin-left:3px; }
  .left{ font-size:12px; color:var(--slate500); margin-top:1px; }
  .title{ font-size:13px; font-weight:700; color:var(--slate900); margin-top:6px;
          white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .date{ font-family:ui-monospace,monospace; font-size:10px; color:var(--slate400); margin-top:2px; }
  .soon .num{ color:var(--rose); }
  .placeholder{ font-size:12px; color:var(--slate400); margin:auto 0; line-height:1.4; }

  /* --- today's rituals: tap a row to tick it off ------------------------- */
  .rule{ height:1px; background:#E4BEB1; margin:9px 0 7px; }
  .label{ font-family:ui-monospace,monospace; font-size:9px; font-weight:700;
          letter-spacing:1.5px; color:var(--slate400); margin-bottom:3px; }
  .habits{ display:flex; flex-direction:column; gap:1px; }
  .habit{
    display:flex; align-items:center; gap:7px; cursor:pointer;
    padding:3px 4px; margin:0 -4px; border-radius:5px;
    -webkit-app-region: no-drag;   /* clickable, not a drag handle */
  }
  .habit:hover{ background:#F7F7F8; }
  .dot{
    width:15px; height:15px; flex:0 0 15px; border-radius:50%;
    border:1.5px solid var(--slate400); box-sizing:border-box;
  }
  .habit.done .dot{ background:#FF5C00; border-color:#FF5C00; }
  .habit .name{ font-size:11.5px; color:var(--slate700);
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .habit.done .name{ color:var(--slate400); text-decoration:line-through; }
  .none{ font-size:11px; color:var(--slate400); }
  .x{
    position:absolute; top:6px; right:8px; width:18px; height:18px;
    border:none; background:transparent; color:var(--slate400); cursor:pointer;
    font-size:15px; line-height:18px; border-radius:6px; padding:0;
    -webkit-app-region: no-drag;
  }
  .x:hover{ background:#f1f5f9; color:var(--slate700); }
</style>
</head>
<body>
  <div class="card" id="card">
    <button class="x" title="Close" onclick="window.close()">&times;</button>
    <div id="content"></div>
  </div>

<script>
  function daysUntil(dateStr){
    const now = new Date();
    const start = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
    const p = String(dateStr).split('-').map(Number);
    const t = Date.UTC(p[0], p[1]-1, p[2]);
    return Math.round((t - start) / 86400000);
  }
  function prettyDate(dateStr){
    const p = String(dateStr).split('-').map(Number);
    const d = new Date(p[0], p[1]-1, p[2]);
    const wk=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return wk[d.getDay()]+' '+mo[d.getMonth()]+' '+d.getDate();
  }
  function localDateStr(d = new Date()){
    const p = n => String(n).padStart(2,'0');
    return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
  }
  function esc(s){ return String(s||'').replace(/[<>&"]/g, c =>
    ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

  // Habits due today, mirroring Habit.isDueOn / kWidgetHabitSlots on the app side.
  function habitsDueToday(state){
    const today = localDateStr();
    const weekday = (new Date().getDay() + 6) % 7 + 1;   // JS Sun=0 -> Mon=1..Sun=7
    const done = new Set(((state.dayLogs||{})[today]||{}).habits || []);
    return (state.habits||[])
      .filter(h => (h.days || [1,2,3,4,5,6,7]).includes(weekday))
      .slice(0, 3)
      .map(h => ({ id: h.id, name: h.name, done: done.has(h.id) }));
  }

  async function toggleHabit(id){
    // Paint the change straight away, then tell the shell (which queues it for
    // the app and rewrites state.json).
    const row = document.querySelector('.habit[data-id="'+CSS.escape(id)+'"]');
    if(row) row.classList.toggle('done');
    try{ await fetch('/api/widget/toggle-habit?id='+encodeURIComponent(id), {method:'POST'}); }
    catch(e){}
    setTimeout(render, 400);
  }

  function habitsHtml(state){
    const habits = habitsDueToday(state);
    let html = '<div class="rule"></div>';
    if(!habits.length) return html + '<div class="none">No rituals due today</div>';
    html += '<div class="label">TODAY</div><div class="habits">';
    for(const h of habits){
      html += '<div class="habit'+(h.done?' done':'')+'" data-id="'+esc(h.id)+'">' +
              '<div class="dot"></div><div class="name">'+esc(h.name)+'</div></div>';
    }
    return html + '</div>';
  }

  async function render(){
    let state = {};
    try{ state = await (await fetch('/state.json', {cache:'no-store'})).json(); }
    catch(e){ state = {}; }
    const events = (state.events||[])
      .map(e => ({...e, d: daysUntil(e.date)}))
      .filter(e => e.d >= 0)
      .sort((a,b) => a.d - b.d);
    const ev = events[0];
    const card = document.getElementById('card');
    const el = document.getElementById('content');

    if(!ev){
      card.classList.remove('soon');
      el.innerHTML = '<div class="nextup">NEXT UP</div>' +
        '<div class="placeholder">Open Swayra and add an exam to start the countdown.</div>' +
        habitsHtml(state);
    } else {
      card.classList.toggle('soon', ev.d <= 7);
      el.innerHTML =
        '<div class="nextup">NEXT UP</div>' +
        '<div class="num">' + ev.d + '<span class="d">d</span></div>' +
        '<div class="left">days left</div>' +
        '<div class="title">' + esc(ev.title||'Exam') + '</div>' +
        '<div class="date">' + prettyDate(ev.date) + '</div>' +
        habitsHtml(state);
    }

    el.querySelectorAll('.habit').forEach(row =>
      row.addEventListener('click', () => toggleHabit(row.dataset.id)));
  }
  window.render = render;
  render();
  setInterval(render, 30000);            // refresh from the app's saved data
  window.addEventListener('focus', render);
</script>
</body>
</html>
