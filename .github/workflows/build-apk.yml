name: Build Android APK (GitHub Cloud Build)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK on GitHub Actions
    runs-on: ubuntu-latest
    # Needed so the job can push the freshly built APK back into docs/.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Must match the local SDK the pubspec.lock was resolved against
          # (Dart >=3.12 / Flutter >=3.44), or `flutter pub get` fails.
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd study_desk
          flutter pub get

      - name: Build Android APK
        run: |
          cd study_desk
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Swayra-APK
          path: study_desk/build/app/outputs/flutter-apk/app-release.apk

      # Keeps the landing-page download in sync with the code. Without this,
      # docs/swayra.apk is a hand-copied snapshot that silently goes stale and
      # people install an old build.
      - name: Publish fresh APK to the landing page
        run: |
          cp study_desk/build/app/outputs/flutter-apk/app-release.apk docs/swayra.apk
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/swayra.apk
          if git diff --staged --quiet; then
            echo "APK unchanged — nothing to publish."
          else
            # [skip ci] stops this push from triggering another build.
            git commit -m "Publish latest APK to landing page [skip ci]"
            git push
          fi
