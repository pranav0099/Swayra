org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation: it repeatedly fails to close its
# .tab cache files on this Windows setup (path has spaces / file locking),
# breaking every build. Non-incremental is fully reliable here.
kotlin.incremental=false
org.gradle.caching=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
